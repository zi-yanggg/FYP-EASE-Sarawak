<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>EASE logo system</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 0; padding: 0; background: transparent; }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }
  .pad {
    padding: 20px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    min-height: 150px;
  }
  .light { background: #FFFDF5; border: 1px solid var(--gold-line); }
  .dark  { background: #0A0A0A; border: 1px solid #0A0A0A; }
  .gold  { background: var(--gold); border: 1px solid var(--gold); }
  .lbl {
    font-family: var(--font-admin);
    font-size: 9.5px; font-weight: 800;
    letter-spacing: 1.2px; text-transform: uppercase;
  }
  .light .lbl { color: var(--fg4); }
  .dark  .lbl { color: var(--gold); }
  .gold  .lbl { color: var(--ink-1); }
  img { display: block; max-width: 100%; max-height: 70px; height: auto; }
</style>
</head>
<body>
<div class="card">
  <div class="row">

    <div class="pad light">
      <img src="../assets/logo-ease-black.png" alt="Logo on cream">
      <span class="lbl">Wordmark · paper</span>
    </div>
    <div class="pad dark">
      <img src="../assets/logo-ease-black.png" alt="Logo on dark"
           style="filter: invert(1) grayscale(1) brightness(1.8) contrast(1.2)">
      <span class="lbl">Wordmark · ink</span>
    </div>
    <div class="pad gold">
      <img src="../assets/logo-ease-mark.png" alt="Mark on gold"
           style="max-width: 70px; max-height: 70px;">
      <span class="lbl">Mark · gold</span>
    </div>

  </div>
</div>
</body></html>
