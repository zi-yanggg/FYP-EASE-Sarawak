<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Marketing navbar &amp; footer</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: var(--surface); }
  .card { padding: 0; gap: 0; background: transparent; }

  /* Navbar */
  .navbar {
    background: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 22px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  .navbar img {
    height: 48px;
    object-fit: contain;
  }
  .menu {
    display: flex; align-items: center; gap: 22px;
    font-family: "EurostarRegular", Arial, sans-serif;
    font-size: 14px;
    color: var(--fg2);
  }
  .menu a {
    text-decoration: none;
    color: var(--fg2);
    font-weight: 500;
  }
  .menu a.dropdown::after { content: " ▾"; }
  .menu .btn {
    background: var(--gold);
    color: #fff;
    padding: 6px 14px;
    border-radius: 5px;
    font-weight: bold;
    text-decoration: none;
    font-size: 13px;
  }
  .menu a.act { color: var(--gold); font-weight: bold; }

  /* Footer */
  .footer {
    background: #111;
    color: #ddd;
    text-align: center;
    padding: 22px 16px 16px;
  }
  .footer-logo img {
    width: 110px;
    margin-bottom: 12px;
    filter: invert(1) grayscale(1) brightness(1.8) contrast(1.2);
  }
  hr.gold-rule {
    border: none;
    border-top: 2px solid var(--gold);
    margin: 12px auto;
    max-width: 500px;
  }
  .footer-links {
    list-style: none;
    padding: 0;
    margin: 12px 0 8px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 18px;
  }
  .footer-links li a {
    color: #ddd;
    text-decoration: none;
    font-family: "EurostarRegular", Arial, sans-serif;
    font-size: 13px;
  }
  .footer-copy {
    font-family: "EurostarRegular", Arial, sans-serif;
    font-size: 11px;
    color: var(--gold);
    margin-top: 8px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="navbar">
    <img src="../assets/logo-ease-black.png" alt="EASE">
    <div class="menu">
      <a href="#">Menu</a>
      <a href="#">About Us</a>
      <a href="#" class="btn act">Book Now</a>
    </div>
  </div>

  <div class="footer">
    <div class="footer-logo"><img src="../assets/logo-ease-black.png" alt="EASE"></div>
    <hr class="gold-rule">
    <ul class="footer-links">
      <li><a>Our Services</a></li>
      <li><a>How It Works</a></li>
      <li><a>Why Us</a></li>
      <li><a>Contact Us</a></li>
      <li><a>Privacy Policy</a></li>
      <li><a>Terms &amp; Conditions</a></li>
    </ul>
    <div class="footer-copy">© 2025 EASE SARAWAK. All rights reserved.</div>
  </div>
</div>
</body></html>
