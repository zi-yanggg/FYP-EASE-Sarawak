<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Imagery library</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 0; padding: 12px; background: transparent; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 84px);
    gap: 6px;
  }
  .grid img {
    width: 100%; height: 100%; object-fit: cover;
    border-radius: 6px;
    display: block;
  }
  .grid .tall {
    grid-column: span 2;
    grid-row: span 2;
    height: auto;
  }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <img class="tall" src="../assets/photo-hero-1.webp" alt="">
    <img src="../assets/photo-hero-2.webp" alt="">
    <img src="../assets/photo-traveler.webp" alt="">
    <img src="../assets/photo-valet.webp" alt="">
    <img src="../assets/photo-parcels.webp" alt="">
    <img src="../assets/photo-airplane-loading.webp" alt="">
    <img src="../assets/photo-banner-1.webp" alt="">
  </div>
</div>
</body></html>
