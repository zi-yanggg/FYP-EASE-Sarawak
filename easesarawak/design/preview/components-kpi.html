<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>KPI cards</title>
<link rel="stylesheet" href="_base.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  body { background: var(--paper); }
  .card { background: transparent; padding: 18px; gap: 0; }
  .kpis {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 0;
    background: #fff;
    border: 1px solid var(--gold-line);
    border-radius: 18px;
    overflow: hidden;
  }
  .kpi {
    padding: 16px 18px;
    border-right: 1px solid var(--gold-line);
    display: flex; flex-direction: column;
    min-height: 144px;
  }
  .kpi:last-child { border-right: none; }
  .kpi .eb {
    display: flex; align-items: center; gap: 9px;
    font-family: var(--font-admin);
    font-size: 9.5px; font-weight: 800; letter-spacing: 1.4px;
    color: var(--fg3); text-transform: uppercase;
  }
  .kpi .ic {
    width: 32px; height: 32px;
    background: var(--gold);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-1);
    font-size: 15px;
  }
  .kpi .v {
    font-family: var(--font-display);
    font-size: 2.1rem;
    color: var(--ink-1);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-top: 12px;
  }
  .kpi .v small {
    font-family: var(--font-admin);
    font-size: 1rem;
    color: var(--fg3);
    margin-left: 4px;
    font-weight: 700;
  }
  .kpi .m {
    margin-top: auto;
    padding: 8px 0 0;
    border-top: 1px solid #F2EAC4;
    font-size: 10.5px;
    color: var(--fg4);
    display: flex; align-items: center; gap: 8px;
  }
  .dt {
    font-family: var(--font-admin);
    font-size: 10px; font-weight: 800;
    color: var(--done);
  }
  .dt.dn { color: var(--danger); }
</style>
</head>
<body>
<div class="card">
  <div class="kpis">

    <div class="kpi">
      <div class="eb"><span class="ic"><i class="fas fa-coins"></i></span>Today's Revenue</div>
      <div class="v">RM 1,284<small>.50</small></div>
      <div class="m"><span class="dt">▲ 12%</span> vs yesterday</div>
    </div>

    <div class="kpi">
      <div class="eb"><span class="ic"><i class="fas fa-shopping-bag"></i></span>Today's Orders</div>
      <div class="v">38</div>
      <div class="m"><span class="dt dn">▼ 3%</span> vs yesterday</div>
    </div>

    <div class="kpi">
      <div class="eb"><span class="ic"><i class="fas fa-hourglass-half"></i></span>Pending</div>
      <div class="v">7</div>
      <div class="m">2 currently in progress</div>
    </div>

  </div>
</div>
</body></html>
