<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Display type — Eurostar / BebasKai</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 18px; padding: 28px; }
  .specimen {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--gold-line);
  }
  .specimen:last-child { border-bottom: none; padding-bottom: 0; }
  .specimen .meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg4);
    letter-spacing: 0.04em;
  }
  .specimen .meta b { color: var(--ink-1); font-weight: 700; }
  .eurostar { font-family: var(--font-display); }
  .bebas    { font-family: var(--font-decorative); letter-spacing: 0.02em; }
  .h-hero    { font-size: 56px; font-weight: 400; line-height: 1; letter-spacing: -0.02em; color: var(--ink-1); }
  .h-h2      { font-size: 36px; font-weight: 400; line-height: 1.05; letter-spacing: -0.01em; color: var(--ink-1); }
  .h-bebas   { font-size: 44px; line-height: 1; color: var(--ink-1); }
  .h-bebas .gold { color: var(--gold); }
</style>
</head>
<body>
<div class="card">

  <div class="specimen">
    <div class="meta"><b>EurostarRegular</b> · 56 / 1.0 / -0.02em</div>
    <div class="eurostar h-hero">Travel Light.</div>
  </div>

  <div class="specimen">
    <div class="meta"><b>EurostarRegular</b> · 36 / 1.05 / -0.01em</div>
    <div class="eurostar h-h2">KUCHING HANDS-FREE TRAVEL</div>
  </div>

  <div class="specimen">
    <div class="meta"><b>BebasKai</b> · 44 / 1.0</div>
    <div class="bebas h-bebas">RM <span class="gold">29</span><span style="font-size:24px">.00</span></div>
  </div>

</div>
</body></html>
