<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Iconography — brand PNGs vs Font Awesome</title>
<link rel="stylesheet" href="_base.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  .card { gap: 14px; padding: 22px; }
  .lbl {
    font-family: var(--font-admin); font-size: 9.5px; font-weight: 800;
    letter-spacing: 1.2px; text-transform: uppercase; color: var(--fg4);
  }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  /* Brand PNG tiles */
  .png-tile {
    width: 56px; height: 56px;
    background: var(--gold);
    border-radius: 10px;
    padding: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .png-tile img { width: 100%; height: 100%; object-fit: contain; filter: invert(1); }

  /* FA icons */
  .fa-tile {
    width: 36px; height: 36px;
    background: var(--ink-1);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold);
    font-size: 16px;
  }
  /* Outline circle icon (contact) */
  .ic-circle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    color: var(--gold);
    font-size: 14px;
  }
  /* Bootstrap icon caret */
  .bi-tile {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    color: var(--fg3);
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="card">

  <span class="lbl">Brand PNG iconography · marketing service slots</span>
  <div class="row">
    <div class="png-tile"><img src="../assets/icon-storage.png" alt=""></div>
    <div class="png-tile"><img src="../assets/icon-baggage.png" alt=""></div>
    <div class="png-tile"><img src="../assets/icon-suitcase.png" alt=""></div>
    <div class="png-tile"><img src="../assets/icon-luggage.png" alt=""></div>
    <div class="png-tile"><img src="../assets/icon-distance.png" alt=""></div>
    <div class="png-tile"><img src="../assets/icon-delivery-man.png" alt=""></div>
    <div class="png-tile"><img src="../assets/icon-deliver-to.png" alt=""></div>
    <div class="png-tile"><img src="../assets/icon-send-from.png" alt=""></div>
  </div>

  <span class="lbl">Font Awesome 6 solid · admin chrome</span>
  <div class="row">
    <div class="fa-tile"><i class="fas fa-home"></i></div>
    <div class="fa-tile"><i class="fas fa-shopping-bag"></i></div>
    <div class="fa-tile"><i class="fas fa-truck"></i></div>
    <div class="fa-tile"><i class="fas fa-warehouse"></i></div>
    <div class="fa-tile"><i class="fas fa-coins"></i></div>
    <div class="fa-tile"><i class="fas fa-calendar-alt"></i></div>
    <div class="fa-tile"><i class="fas fa-tag"></i></div>
    <div class="fa-tile"><i class="fas fa-file-invoice-dollar"></i></div>
  </div>

  <span class="lbl">Contact circles + small affordances</span>
  <div class="row">
    <span class="ic-circle"><i class="bi bi-telephone"></i></span>
    <span class="ic-circle"><i class="bi bi-envelope"></i></span>
    <span class="ic-circle"><i class="bi bi-geo-alt"></i></span>
    <span class="bi-tile"><i class="bi bi-search"></i></span>
    <span class="bi-tile"><i class="bi bi-caret-down-fill"></i></span>
    <span class="bi-tile"><i class="bi bi-sun-fill"></i></span>
    <span class="bi-tile"><i class="bi bi-moon-stars-fill"></i></span>
  </div>

</div>
</body></html>
