<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Foreground & semantic</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 14px; padding: 24px; }

  .group { display: flex; flex-direction: column; gap: 10px; }
  .group-title {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--font-admin);
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.6px; text-transform: uppercase;
    color: var(--fg3);
  }
  .group-title::after {
    content: ""; flex: 1; height: 1px;
    background: var(--gold-line);
  }

  /* ── Solid swatch grid — matches Colors core card ─────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .grid.sem { grid-template-columns: repeat(4, 1fr); }

  .sw {
    display: flex; flex-direction: column; gap: 6px;
  }
  .sw .chip {
    height: 78px;
    border-radius: 12px;
    border: 1px solid rgba(0, 0, 0, 0.06);
    box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
    display: flex; align-items: flex-end; padding: 10px;
  }
  .sw .pill-overlay {
    font-family: "EurostarRegular", sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .sw .name {
    font-family: var(--font-admin);
    font-size: 10px; font-weight: 800;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--ink-1);
  }
  .sw .hex {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--fg4);
  }
</style>
</head>
<body>
<div class="card">

  <div class="group">
    <span class="group-title">Foreground ramp</span>
    <div class="grid">
      <div class="sw">
        <div class="chip" style="background:#111827"><span class="pill-overlay" style="color:#fff">Aa</span></div>
        <span class="name">fg1 · body</span>
        <span class="hex">#111827</span>
      </div>
      <div class="sw">
        <div class="chip" style="background:#333333"><span class="pill-overlay" style="color:#fff">Aa</span></div>
        <span class="name">fg2</span>
        <span class="hex">#333333</span>
      </div>
      <div class="sw">
        <div class="chip" style="background:#555555"><span class="pill-overlay" style="color:#fff">Aa</span></div>
        <span class="name">fg3</span>
        <span class="hex">#555555</span>
      </div>
      <div class="sw">
        <div class="chip" style="background:#6B7280"><span class="pill-overlay" style="color:#fff">Aa</span></div>
        <span class="name">fg4 · meta</span>
        <span class="hex">#6B7280</span>
      </div>
      <div class="sw">
        <div class="chip" style="background:#9CA3AF"><span class="pill-overlay" style="color:#fff">Aa</span></div>
        <span class="name">fg5 · ghost</span>
        <span class="hex">#9CA3AF</span>
      </div>
    </div>
  </div>

  <div class="group">
    <span class="group-title">Semantic status</span>
    <div class="grid sem">
      <div class="sw">
        <div class="chip" style="background:#F2BE00"><span class="pill-overlay" style="color:#0A0A0A">Pending</span></div>
        <span class="name">Pending</span>
        <span class="hex">#F2BE00</span>
      </div>
      <div class="sw">
        <div class="chip" style="background:#5B532C"><span class="pill-overlay" style="color:#fff">In progress</span></div>
        <span class="name">In progress</span>
        <span class="hex">#5B532C</span>
      </div>
      <div class="sw">
        <div class="chip" style="background:#1E8E3E"><span class="pill-overlay" style="color:#fff">Completed</span></div>
        <span class="name">Completed</span>
        <span class="hex">#1E8E3E</span>
      </div>
      <div class="sw">
        <div class="chip" style="background:#C04545"><span class="pill-overlay" style="color:#fff">Refund</span></div>
        <span class="name">Refund · danger</span>
        <span class="hex">#C04545</span>
      </div>
    </div>
  </div>

</div>
</body></html>
