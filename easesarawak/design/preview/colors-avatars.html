<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Avatar palette</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 16px; padding: 28px; }
  .group-title {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--font-admin);
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.6px; text-transform: uppercase;
    color: var(--fg3);
  }
  .group-title::after {
    content: ""; flex: 1; height: 1px;
    background: var(--gold-line);
  }
  .row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
  }
  .item {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .av {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 20px; font-weight: 400;
    letter-spacing: -0.01em;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .nm {
    font-family: var(--font-admin);
    font-size: 11px; font-weight: 700;
    color: var(--ink-1);
    letter-spacing: .04em;
  }
  .hx {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg4);
  }
</style>
</head>
<body>
<div class="card">
  <span class="group-title">Avatar palette · brand + basic colours</span>
  <div class="row">
    <div class="item">
      <div class="av" style="background:#F2BE00; color:#0A0A0A">EA</div>
      <div class="nm">Gold</div>
      <div class="hx">#F2BE00</div>
    </div>
    <div class="item">
      <div class="av" style="background:#1E1E1E; color:#F2BE00">SY</div>
      <div class="nm">Ink</div>
      <div class="hx">#1E1E1E</div>
    </div>
    <div class="item">
      <div class="av" style="background:#1A6CB0; color:#fff">LK</div>
      <div class="nm">Blue</div>
      <div class="hx">#1A6CB0</div>
    </div>
    <div class="item">
      <div class="av" style="background:#2BA869; color:#fff">MA</div>
      <div class="nm">Green</div>
      <div class="hx">#2BA869</div>
    </div>
    <div class="item">
      <div class="av" style="background:#C04545; color:#fff">JT</div>
      <div class="nm">Red</div>
      <div class="hx">#C04545</div>
    </div>
    <div class="item">
      <div class="av" style="background:#fff; color:#0A0A0A; border: 2px solid #F2BE00; box-shadow: none;">CK</div>
      <div class="nm">Outline</div>
      <div class="hx">#FFF · gold ring</div>
    </div>
  </div>
</div>
</body></html>
