<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Pill eyebrows — signature</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 16px; padding: 26px; align-items: flex-start; }

  /* Marketing-style pill — white, big, dot accents */
  .marketing-pill {
    display: inline-flex;
    align-items: center;
    width: fit-content;
    gap: 15px;
    background: #fff;
    border-radius: 50px;
    padding: 10px 25px;
    font-family: "EurostarRegular", sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #000;
    text-transform: uppercase;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
  }
  .marketing-pill .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--gold);
    display: inline-block;
  }

  /* Admin-style pill — now uses Eurostar to match marketing */
  .admin-pill {
    display: inline-flex; align-items: center; gap: 9px;
    background: var(--gold); color: var(--ink-1);
    padding: 6px 14px;
    font-family: "EurostarRegular", sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 999px;
  }
  .admin-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ink-1); }

  .admin-pill.ghost {
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
  }
  .admin-pill.ghost .dot { background: var(--gold); }

  /* On dark surface */
  .dark-strip {
    background: var(--ink-1);
    border-radius: 12px;
    padding: 18px 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .lbl {
    font-family: var(--font-admin);
    font-size: 9.5px; font-weight: 800;
    letter-spacing: 1.2px; color: var(--fg4);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="card">

  <div class="lbl">Marketing — white on photo / cream</div>
  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <span class="marketing-pill"><span class="dot"></span>OUR SERVICES<span class="dot"></span></span>
    <span class="marketing-pill"><span class="dot"></span>WHY CHOOSE EASE?<span class="dot"></span></span>
  </div>

  <div class="lbl">Admin — gold pill · Eurostar</div>
  <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
    <span class="admin-pill"><span class="dot"></span>Live operations</span>
    <span class="admin-pill"><span class="dot"></span>Today &middot; Apr 26</span>
    <span class="admin-pill ghost"><span class="dot"></span>Filter active</span>
  </div>

  <div class="lbl">Admin — on dark</div>
  <div class="dark-strip">
    <span class="admin-pill"><span class="dot"></span>System healthy</span>
    <span class="admin-pill" style="background:#FF8B5A;"><span class="dot"></span>3 urgent</span>
  </div>

</div>
</body></html>
