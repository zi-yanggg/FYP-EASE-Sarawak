<svg viewBox="0 0 1700 580" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1700" height="580" fill="#ffffff"/>

  <!-- Title -->
  <text x="850" y="38" text-anchor="middle" font-size="24" font-weight="bold" fill="#1F4E79">EASE Sarawak — System Architecture</text>

  <!-- ===== User ===== -->
  <rect x="40" y="245" width="120" height="80" rx="8" fill="#F5F5F5" stroke="#888" stroke-width="1.5"/>
  <text x="100" y="290" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">User</text>

  <!-- User <-> Web Server arrows -->
  <line x1="162" y1="268" x2="246" y2="268" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="204" y="260" text-anchor="middle" font-size="13" fill="#555">HTTP Request</text>
  <line x1="246" y1="302" x2="162" y2="302" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="204" y="318" text-anchor="middle" font-size="13" fill="#555">Returns</text>

  <!-- ===== Web Server ===== -->
  <rect x="250" y="230" width="185" height="110" rx="8" fill="#FFF3E0" stroke="#E08B00" stroke-width="1.5"/>
  <text x="342" y="270" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Web Server</text>
  <text x="342" y="292" text-anchor="middle" font-size="13" fill="#555">Apache + PHP 8.1</text>
  <text x="342" y="312" text-anchor="middle" font-size="13" fill="#555">(XAMPP / AWS EC2)</text>

  <!-- Web Server <-> CI4 arrows -->
  <line x1="437" y1="268" x2="576" y2="274" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="505" y="252" text-anchor="middle" font-size="13" fill="#555">Routes Request</text>
  <line x1="576" y1="300" x2="437" y2="305" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="505" y="322" text-anchor="middle" font-size="13" fill="#555">Returns</text>

  <!-- ===== CodeIgniter 4 container ===== -->
  <rect x="540" y="75" width="820" height="465" rx="14" fill="#FFFFFF" stroke="#1F4E79" stroke-width="2"/>
  <text x="950" y="105" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F4E79">CodeIgniter 4 — MVC Architecture Framework</text>
  <text x="950" y="128" text-anchor="middle" font-size="13" fill="#777">PHP 8.1  •  Bootstrap 5 (UI)  •  Multi-language (EN / BM)</text>

  <!-- Router -->
  <rect x="580" y="250" width="110" height="55" rx="6" fill="#E3F2FD" stroke="#1F4E79" stroke-width="1.5"/>
  <text x="635" y="283" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F4E79">Router</text>

  <!-- Controller -->
  <rect x="745" y="250" width="130" height="55" rx="6" fill="#E3F2FD" stroke="#1F4E79" stroke-width="1.5"/>
  <text x="810" y="283" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F4E79">Controller</text>

  <!-- Model -->
  <rect x="945" y="250" width="110" height="55" rx="6" fill="#E3F2FD" stroke="#1F4E79" stroke-width="1.5"/>
  <text x="1000" y="283" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F4E79">Model</text>

  <!-- Router -> Controller -->
  <line x1="690" y1="277" x2="743" y2="277" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Controller -> Model -->
  <line x1="875" y1="277" x2="943" y2="277" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Load View -->
  <rect x="745" y="360" width="130" height="50" rx="6" fill="#EDE7F6" stroke="#5E35B1" stroke-width="1.5"/>
  <text x="810" y="390" text-anchor="middle" font-size="15" font-weight="bold" fill="#5E35B1">Load View</text>

  <!-- Controller -> Load View -->
  <line x1="810" y1="305" x2="810" y2="358" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Public View -->
  <rect x="945" y="345" width="150" height="44" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="1020" y="372" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">Public View</text>

  <!-- Admin View -->
  <rect x="945" y="400" width="150" height="44" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="1020" y="427" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">Admin View</text>

  <!-- Load View -> Public/Admin -->
  <line x1="875" y1="378" x2="943" y2="368" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="875" y1="392" x2="943" y2="421" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- External APIs -->
  <rect x="575" y="360" width="155" height="150" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="652" y="382" text-anchor="middle" font-size="14" font-weight="bold" fill="#B07400">External APIs</text>
  <text x="652" y="408" text-anchor="middle" font-size="13" fill="#555">Stripe — Payment</text>
  <text x="652" y="432" text-anchor="middle" font-size="13" fill="#555">Gemini — AI</text>
  <text x="652" y="456" text-anchor="middle" font-size="13" fill="#555">Google Maps — Map</text>
  <text x="652" y="486" text-anchor="middle" font-size="13" fill="#555">TCPDF — Receipts</text>

  <!-- Controller -> External APIs -->
  <line x1="760" y1="305" x2="690" y2="360" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="338" text-anchor="middle" font-size="12" fill="#555">API calls</text>

  <!-- ===== Model <-> Database ===== -->
  <line x1="1055" y1="270" x2="1446" y2="262" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1250" y="250" text-anchor="middle" font-size="13" fill="#555">MySQL Queries</text>
  <line x1="1446" y1="296" x2="1057" y2="300" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1250" y="320" text-anchor="middle" font-size="13" fill="#555">Returns Relevant Data</text>

  <!-- ===== Database ===== -->
  <rect x="1450" y="228" width="200" height="115" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/>
  <text x="1550" y="268" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">MySQL Database</text>
  <text x="1550" y="292" text-anchor="middle" font-size="13" fill="#555">Managed Hosting</text>
  <text x="1550" y="312" text-anchor="middle" font-size="13" fill="#555">(AWS RDS)</text>

  <!-- footer note -->
  <text x="850" y="565" text-anchor="middle" font-size="12" fill="#999">Monolithic MVC application · server-rendered views · managed MySQL · third-party APIs called server-side</text>
</svg>
