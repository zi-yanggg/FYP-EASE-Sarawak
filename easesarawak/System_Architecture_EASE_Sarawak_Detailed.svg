<svg viewBox="0 0 1700 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="ra" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#D32F2F"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1700" height="560" fill="#ffffff"/>
  <text x="850" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F4E79">EASE Sarawak — System Architecture (MVC)</text>

  <!-- ===== User ===== -->
  <circle cx="70" cy="250" r="16" fill="#E53935"/>
  <path d="M44,312 Q70,272 96,312 Z" fill="#E53935"/>
  <text x="70" y="338" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">User</text>

  <!-- User <-> Web Server -->
  <line x1="110" y1="268" x2="171" y2="268" stroke="#D32F2F" stroke-width="1.6" marker-end="url(#ra)"/>
  <text x="140" y="261" text-anchor="middle" font-size="11" fill="#C62828">Request</text>
  <line x1="171" y1="300" x2="110" y2="300" stroke="#D32F2F" stroke-width="1.6" marker-end="url(#ra)"/>
  <text x="140" y="314" text-anchor="middle" font-size="11" fill="#C62828">Serves</text>

  <!-- ===== Web Server ===== -->
  <rect x="175" y="235" width="150" height="100" rx="8" fill="#FFF3E0" stroke="#E08B00" stroke-width="1.5"/>
  <text x="250" y="272" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Web Server</text>
  <text x="250" y="293" text-anchor="middle" font-size="12" fill="#555">Apache + PHP 8.1</text>
  <text x="250" y="311" text-anchor="middle" font-size="12" fill="#555">(XAMPP / AWS EC2)</text>

  <!-- Web Server <-> View -->
  <line x1="325" y1="268" x2="391" y2="272" stroke="#D32F2F" stroke-width="1.6" marker-end="url(#ra)"/>
  <text x="358" y="261" text-anchor="middle" font-size="11" fill="#C62828">Request</text>
  <line x1="391" y1="300" x2="325" y2="303" stroke="#D32F2F" stroke-width="1.6" marker-end="url(#ra)"/>
  <text x="358" y="316" text-anchor="middle" font-size="11" fill="#C62828">Serves</text>

  <!-- ===== MVC container ===== -->
  <rect x="370" y="118" width="1080" height="415" rx="14" fill="#FFFFFF" stroke="#1F4E79" stroke-width="2"/>
  <text x="910" y="146" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F4E79">CodeIgniter 4 — MVC Architecture Framework  (PHP 8.1 · Bootstrap 5)</text>

  <!-- View (Module) -->
  <text x="502" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">View (Module)</text>
  <rect x="395" y="200" width="215" height="210" rx="8" fill="#F4FBF5" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="502" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Bootstrap 5 (UI)</text>
  <text x="502" y="259" text-anchor="middle" font-size="13" fill="#555">CI4 View Templates</text>
  <line x1="415" y1="276" x2="590" y2="276" stroke="#CFE8D2" stroke-width="1"/>
  <text x="502" y="302" text-anchor="middle" font-size="13" fill="#555">Public View</text>
  <text x="502" y="328" text-anchor="middle" font-size="13" fill="#555">Admin View</text>
  <text x="502" y="354" text-anchor="middle" font-size="13" fill="#555">Multi-language (EN/BM)</text>

  <!-- Controller (Class) -->
  <text x="772" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F4E79">Controller (Class)</text>
  <rect x="655" y="200" width="235" height="210" rx="8" fill="#F0F7FE" stroke="#1F4E79" stroke-width="1.5"/>
  <text x="772" y="234" text-anchor="middle" font-size="13" fill="#333">Home</text>
  <text x="772" y="258" text-anchor="middle" font-size="13" fill="#333">Admin</text>
  <text x="772" y="282" text-anchor="middle" font-size="13" fill="#333">CardPayment</text>
  <text x="772" y="306" text-anchor="middle" font-size="13" fill="#333">AuthController</text>
  <text x="772" y="330" text-anchor="middle" font-size="13" fill="#333">Profile / Receipt</text>
  <text x="772" y="354" text-anchor="middle" font-size="13" fill="#333">PromoCodeController</text>

  <!-- Model (Data Access) -->
  <text x="1072" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#5E35B1">Model (Data Access)</text>
  <rect x="935" y="200" width="275" height="210" rx="8" fill="#F7F4FD" stroke="#5E35B1" stroke-width="1.5"/>
  <text x="1072" y="234" text-anchor="middle" font-size="13" fill="#333">User_model</text>
  <text x="1072" y="258" text-anchor="middle" font-size="13" fill="#333">OrderModel</text>
  <text x="1072" y="282" text-anchor="middle" font-size="13" fill="#333">PaymentModel</text>
  <text x="1072" y="306" text-anchor="middle" font-size="13" fill="#333">PromoCodeModel</text>
  <text x="1072" y="330" text-anchor="middle" font-size="13" fill="#333">ServiceManagementModel</text>
  <text x="1072" y="354" text-anchor="middle" font-size="13" fill="#333">MessageModel</text>

  <!-- Query Builder (ORM-equivalent) -->
  <rect x="1255" y="252" width="125" height="105" rx="8" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5"/>
  <text x="1317" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#00695C">Query</text>
  <text x="1317" y="308" text-anchor="middle" font-size="13" font-weight="bold" fill="#00695C">Builder</text>
  <text x="1317" y="330" text-anchor="middle" font-size="11" fill="#00796B">(Active Record)</text>

  <!-- View <-> Controller -->
  <line x1="610" y1="286" x2="653" y2="286" stroke="#D32F2F" stroke-width="1.6" marker-end="url(#ra)"/>
  <text x="632" y="278" text-anchor="middle" font-size="10" fill="#C62828">Request for data</text>
  <line x1="653" y1="322" x2="610" y2="322" stroke="#D32F2F" stroke-width="1.6" marker-end="url(#ra)"/>
  <text x="632" y="336" text-anchor="middle" font-size="10" fill="#C62828">Loads view</text>

  <!-- Controller <-> Model -->
  <line x1="890" y1="286" x2="933" y2="286" stroke="#D32F2F" stroke-width="1.6" marker-end="url(#ra)"/>
  <text x="912" y="278" text-anchor="middle" font-size="10" fill="#C62828">Query</text>
  <line x1="933" y1="322" x2="890" y2="322" stroke="#D32F2F" stroke-width="1.6" marker-end="url(#ra)"/>
  <text x="912" y="336" text-anchor="middle" font-size="10" fill="#C62828">Response</text>

  <!-- Model -> Query Builder -->
  <line x1="1210" y1="304" x2="1253" y2="304" stroke="#D32F2F" stroke-width="1.6" marker-end="url(#ra)"/>

  <!-- Query Builder <-> Database -->
  <line x1="1380" y1="286" x2="1488" y2="282" stroke="#D32F2F" stroke-width="1.6" marker-end="url(#ra)"/>
  <text x="1434" y="274" text-anchor="middle" font-size="10" fill="#C62828">SQL Query</text>
  <line x1="1488" y1="320" x2="1382" y2="324" stroke="#D32F2F" stroke-width="1.6" marker-end="url(#ra)"/>
  <text x="1434" y="338" text-anchor="middle" font-size="10" fill="#C62828">Return Data</text>

  <!-- ===== Database ===== -->
  <rect x="1490" y="248" width="180" height="115" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/>
  <text x="1580" y="290" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">MySQL Database</text>
  <text x="1580" y="312" text-anchor="middle" font-size="12" fill="#555">Managed Hosting</text>
  <text x="1580" y="331" text-anchor="middle" font-size="12" fill="#555">(AWS RDS)</text>

  <!-- External APIs -->
  <rect x="655" y="436" width="235" height="80" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="772" y="458" text-anchor="middle" font-size="12" font-weight="bold" fill="#B07400">External APIs (server-side)</text>
  <text x="772" y="480" text-anchor="middle" font-size="12" fill="#555">Stripe · Gemini · Google Maps</text>
  <text x="772" y="500" text-anchor="middle" font-size="12" fill="#555">TCPDF (PDF receipts)</text>
  <line x1="772" y1="410" x2="772" y2="434" stroke="#D32F2F" stroke-width="1.6" marker-end="url(#ra)"/>
  <text x="812" y="426" text-anchor="middle" font-size="10" fill="#C62828">API calls</text>

  <text x="850" y="548" text-anchor="middle" font-size="11" fill="#999">Monolithic MVC · server-rendered views · CodeIgniter Query Builder (parameterised) · managed MySQL on AWS RDS</text>
</svg>
